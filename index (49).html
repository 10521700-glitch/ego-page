<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ego</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    margin: 0;
    min-height: 100vh;
    cursor: none;
    background: #000;
    overflow-x: hidden;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 20px;
    padding: 15px;
  }

  @media (hover: hover) and (pointer: fine) {
    body { cursor: none; }
    .cursor, .cursor-dot { display: block; }
  }
  @media (hover: none) and (pointer: coarse) {
    .cursor, .cursor-dot { display: none !important; }
  }

  .bg-image {
    position: fixed;
    top: -5%;
    left: -5%;
    width: 110%;
    height: 110%;
    background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQjxr2Db25gTrgmcP2VkeZzhdiwSKxGZjD1K0u6PtZvCA&s=10');
    background-size: cover;
    background-position: center;
    filter: brightness(0.6) contrast(1.2) saturate(1.3);
    animation: bgFloat 20s ease-in-out infinite alternate;
    z-index: 0;
  }
  
  @keyframes bgFloat {
    0% { transform: scale(1.05); }
    100% { transform: scale(1.15); }
  }

  .scanlines {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      transparent, transparent 2px, rgba(0,255,255,0.03) 3px
    );
    z-index: 2;
    pointer-events: none;
  }

  /* Reproductor Liquid Glass ULTRA ANCHO */
  .spotify-player {
    position: fixed;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 999;
    border-radius: 24px;
    overflow: hidden;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(30px) saturate(200%);
    -webkit-backdrop-filter: blur(30px) saturate(200%);
    border: 1px solid rgba(255, 255, 255, 0.2);
    box-shadow: 0 20px 60px rgba(0, 255, 255, 0.3);
    width: 98%;
    max-width: 500px;
  }
  
  .spotify-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1000;
    pointer-events: none;
  }

  .cursor {
    position: fixed;
    width: 30px;
    height: 30px;
    border: 2px solid #0ff;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transition: transform 0.2s ease;
    box-shadow: 0 0 20px #0ff, 0 0 40px #0ff;
  }

  .cursor-dot {
    position: fixed;
    width: 8px;
    height: 8px;
    background: #0ff;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    box-shadow: 0 0 15px #0ff;
  }

  .nebula {
    position: absolute;
    width: 300%;
    height: 300%;
    background: 
      radial-gradient(circle at 20% 30%, rgba(120,0,255,0.4) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(0,255,255,0.3) 0%, transparent 40%);
    animation: nebulaMove 80s infinite alternate ease-in-out;
    filter: blur(80px);
    z-index: 1;
  }

  @keyframes nebulaMove {
    0% { transform: translate(-20%, -20%) rotate(0deg); }
    100% { transform: translate(20%, 20%) rotate(360deg); }
  }

  /* BOTONES ULTRA ANCHOS */
  .buttons-container {
    display: flex;
    flex-direction: column;
    gap: 14px;
    z-index: 10;
    width: 98%; /* CASI TODO EL ANCHO */
    max-width: 600px; /* EN PC SE ESTIRAN MAS */
    align-items: center;
  }

  .neon-button {
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(20px);
    color: #fff;
    padding: 22px 20px; /* MAS ALTO */
    width: 100%; /* OCUPA TODO */
    border: 3px solid #0ff;
    border-radius: 80px;
    cursor: pointer;
    font-size: 22px; /* LETRA MAS GRANDE */
    font-weight: 900;
    letter-spacing: 3px;
    position: relative;
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-transform: uppercase;
    text-align: center;
    box-shadow: 0 0 25px rgba(0,255,255,0.4);
  }

  .neon-button::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0,255,255,0.6), transparent);
    transition: left 0.6s;
  }

  .neon-button:hover::before, .neon-button:active::before {
    left: 100%;
  }

  .neon-button:hover, .neon-button:active {
    background: rgba(0, 255, 255, 0.35);
    box-shadow: 0 0 50px #0ff, 0 0 100px #0ff;
    transform: scale(1.03) translateY(-3px);
    border-color: #fff;
  }

  .profile-img { 
    width: 120px; 
    height: 120px; 
    border-radius: 50%; 
    border: 4px solid #0ff; 
    z-index: 10;
    box-shadow: 0 0 30px #0ff, 0 0 60px rgba(0,255,255,0.5);
    animation: float 3s ease-in-out infinite;
    object-fit: cover;
    margin-top: 20px;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }

  h1 {
    margin: 0; 
    font-size: 3.2em;
    color: #0ff; 
    text-shadow: 0 0 10px #0ff, 0 0 20px #0ff, 0 0 40px #0ff;
    z-index: 10;
    animation: glow 2s ease-in-out infinite alternate;
    letter-spacing: 5px;
  }

  @keyframes glow {
    from { text-shadow: 0 0 10px #0ff, 0 0 20px #0ff; }
    to { text-shadow: 0 0 20px #0ff, 0 0 40px #0ff, 0 0 80px #0ff; }
  }

  /* MÓVIL: PEGADOS A LAS ORILLAS */
  @media (max-width: 768px) {
    body { padding: 10px; }
    h1 { font-size: 2.8em; }
    .profile-img { width: 100px; height: 100px; }
    .neon-button { 
      font-size: 20px; 
      padding: 20px 15px;
      letter-spacing: 2px;
    }
    .buttons-container { width: 100%; max-width: 100%; }
    .spotify-player { width: 98%; }
  }
</style>
</head>
<body>

<div class="bg-image"></div>
<div class="scanlines"></div>
<div class="cursor"></div>
<div class="cursor-dot"></div>
<div class="nebula"></div>

<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:An9GcRDx00I9BxbVf-o2xeKZt_UyhQ_dq9hUX2kRWX42AFazA&s" alt="Logo" class="profile-img">
<h1>EGO</h1>

<div class="buttons-container">
  <a href="https://www.google.com"><button class="neon-button">Google</button></a>
  <a href="https://www.wikipedia.org"><button class="neon-button">Wikipedia</button></a>
  <a href="https://www.github.com"><button class="neon-button">GitHub</button></a>
  <a href="https://www.youtube.com"><button class="neon-button">YouTube</button></a>
  <a href="https://www.coddy.tech"><button class="neon-button">Coddy</button></a>
</div>

<div class="spotify-player">
  <div class="spotify-overlay"></div>
  <iframe style="border-radius:24px; background: transparent; display: block;" 
    src="https://open.spotify.com/embed/track/4xF4ZBGPZKxECeDFrqSAG4?utm_source=generator&theme=0&loop=1" 
    width="500" 
    height="90" 
    frameBorder="0" 
    allowfullscreen="" 
    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
    loading="lazy">
  </iframe>
</div>

<script>
  if (window.matchMedia("(hover: hover) and (pointer: fine)").matches) {
    const cursor = document.querySelector('.cursor');
    const cursorDot = document.querySelector('.cursor-dot');
    let mouseX = 0, mouseY = 0;
    
    document.addEventListener('mousemove', e => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      cursorDot.style.left = e.clientX - 4 + 'px';
      cursorDot.style.top = e.clientY - 4 + 'px';
    });
    
    function animateCursor() {
      cursor.style.left = mouseX - 15 + 'px';
      cursor.style.top = mouseY - 15 + 'px';
      requestAnimationFrame(animateCursor);
    }
    animateCursor();

    document.querySelectorAll('.neon-button').forEach(btn => {
      btn.addEventListener('mouseenter', () => {
        cursor.style.transform = 'scale(3)';
        cursor.style.background = 'rgba(0,255,255,0.2)';
      });
      btn.addEventListener('mouseleave', () => {
        cursor.style.transform = 'scale(1)';
        cursor.style.background = 'transparent';
      });
    });
  }
</script>

</body>
</html>
